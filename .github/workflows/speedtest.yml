name: Speedtest

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'

jobs:
  speedtest:
    runs-on: ubuntu-latest
    steps:
      - name: Run Speedtest on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl
          run: |
            curl -L -o speedtest.tgz https://install.speedtest.net/app/cli/ookla-speedtest-1.2.0-freebsd-x86_64.tgz
            tar xzf speedtest.tgz
            chmod +x speedtest
            ./speedtest --accept-license --accept-gdpr
