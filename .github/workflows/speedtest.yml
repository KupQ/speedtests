name: Speedtest

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'

jobs:
  speedtest:
    runs-on: ubuntu-latest
    steps:
      - name: Run Speedtest on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl ca_root_nss
          run: |
            # Install speedtest via Ookla's FreeBSD repo
            pkg install -y gnupg
            curl -s https://packagecloud.io/install/repositories/ookla/speedtest-cli/script.freebsd.sh | sh
            pkg install -y speedtest
            speedtest --accept-license --accept-gdpr
