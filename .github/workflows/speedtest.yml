name: Speedtest

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'

jobs:
  speedtest:
    runs-on: windows-11-arm
    steps:
      - name: Download Ookla Speedtest CLI
        run: |
          Invoke-WebRequest -Uri "https://install.speedtest.net/app/cli/ookla-speedtest-1.2.0-win64.zip" -OutFile speedtest.zip
          Expand-Archive -Path speedtest.zip -DestinationPath .
        shell: pwsh

      - name: Run Speedtest
        run: |
          .\speedtest.exe --accept-license --accept-gdpr
        shell: pwsh
